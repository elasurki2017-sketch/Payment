/* =========================

/* =========================

/* =========================
MAIN TABLE
========================= */

.mainTable{

}

.mainTable th{

border:1px solid #b9c4d3;

padding:5px;

background:#12355b;
color:white;

font-weight:bold;

}

.mainTable td{

border:1px solid #d8dde6;

padding:3px;

text-align:center;
vertical-align:middle;

background:white;

}

/* =========================
DATE MERGE ENGINE
========================= */

/* warna grup selang-seling */

.groupWhite td{
background:#ffffff !important;
}

.groupGray td{
background:#f1f3f5 !important;
}

/* cell date hasil merge */

.mergedDate{

text-align:center !important;
vertical-align:middle !important;

font-weight:bold;

padding:0 !important;

line-height:1.4;

}

/* ikut warna grup */

.groupWhite td.mergedDate{
background:#ffffff !important;
}

.groupGray td.mergedDate{
background:#f1f3f5 !important;
}

/* =========================
EDIT ACTIVE ROW
========================= */

.editingRow td{

background:#fff3cd !important;

}

.editingRow td.mergedDate{

}

/* =========================
INPUTS
========================= */

.mainTable input{

width:100%;

border:none;
outline:none;

font-size:10px;

padding:3px;

text-align:center;

background:transparent;

}

/* =========================
WIDTH
========================= */

.colDate{ width:42px; }
.colNo{ width:28px; }
.colFlazz{ width:70px; }
.colCash{ width:70px; }
.colKM{ width:50px; }
.colAction{ width:78px; }

/* =========================
ACTION
========================= */

.actionCell{

display:flex;

justify-content:center;
align-items:center;

gap:4px;

min-height:28px;

}

.actionBtn{

background:transparent;
border:none;

cursor:pointer;

font-size:15px;

padding:1px 3px;

}

/* =========================
SUBTOTAL
========================= */

.subtotalWrap{

display:none;

justify-content:flex-end;

margin-top:12px;

}

.subtotalTable{

border-collapse:collapse;

font-size:11px;
font-weight:bold;

}

.subtotalTable td{

border:1px solid #d8dde6;

padding:6px 12px;

}

.subtotalTable td:first-child{

background:#f8fafc;

}

/* =========================
ADD ROW
========================= */

.addRowWrap{

display:flex;
justify-content:flex-end;

margin-top:12px;

}

/* =========================
HOME
========================= */

.homeText{

height:70vh;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;
font-weight:bold;

color:#12355b;

}

/* =========================
NO
========================= */

.noCell{

font-size:10px;
font-weight:bold;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

.main{
padding:8px;
}

.card{
padding:10px;
}

.mainTable{
font-size:9px;
}

.mainTable input{
font-size:9px;
}

}

<script>

/* ========================================
APP STATE
======================================== */

const APP = {

    storageKey : "tollParkData",

    profileKey : "profileData",

    lastPeriodKey : "lastPeriod",

    autoSaveTimer : null,

    editingRow : null

};


/* ========================================
DOM CACHE
======================================== */

const DOM = {

    bulan :

        document.getElementById(
            "bulan"
        ),

    tahun :

        document.getElementById(
            "tahun"
        ),

    tableBody :

        document.getElementById(
            "tableBody"
        ),

    subTotal :

        document.getElementById(
            "subTotal"
        ),

    subtotalWrap :

        document.getElementById(
            "subtotalWrap"
        ),

    addRowWrap :

        document.getElementById(
            "addRowWrap"
        ),

    btnAddRow :

        document.getElementById(
            "btnAddRow"
        )

};


/* ========================================
SHORTCUTS
======================================== */

function qs(selector){

    return document.querySelector(
        selector
    );

}

function qsa(selector){

    return document.querySelectorAll(
        selector
    );

}

function getRows(){

    return [

        ...qsa(
            "#tableBody tr"
        )

    ];

}


/* ========================================
PAGE NAVIGATION
======================================== */

function showPage(id){

    qsa(".page")
    .forEach(page=>{

        page.classList.remove(
            "active"
        );

    });


    document
    .getElementById(id)
    .classList.add("active");


    qsa(".menu")
    .forEach(menu=>{

        menu.classList.remove(
            "activeMenu"
        );

        if(
            menu.dataset.page===id
        ){

            menu.classList.add(
                "activeMenu"
            );

        }

    });

}


/* ========================================
PROFILE
======================================== */

function saveProfile(){

    let data = {

        nama :

            document
            .getElementById("nama")
            .value,

        nik :

            document
            .getElementById("nik")
            .value,

        user :

            document
            .getElementById("user")
            .value,

        lokasi :

            document
            .getElementById("lokasi")
            .value

    };


    localStorage.setItem(

        APP.profileKey,

        JSON.stringify(data)

    );


    [

        "nama",

        "nik",

        "user",

        "lokasi"

    ].forEach(id=>{

        document
        .getElementById(id)
        .readOnly = true;

    });

}


function editProfile(){

    [

        "nama",

        "nik",

        "user",

        "lokasi"

    ].forEach(id=>{

        document
        .getElementById(id)
        .readOnly = false;

    });

}


function loadProfile(){

    let data =

        JSON.parse(

            localStorage.getItem(
                APP.profileKey
            )

        ) || null;


    if(!data){

        return;
    }


    document
    .getElementById("nama")
    .value = data.nama || "";


    document
    .getElementById("nik")
    .value = data.nik || "";


    document
    .getElementById("user")
    .value = data.user || "";


    document
    .getElementById("lokasi")
    .value = data.lokasi || "";


    [

        "nama",

        "nik",

        "user",

        "lokasi"

    ].forEach(id=>{

        document
        .getElementById(id)
        .readOnly = true;

    });

}


/* ========================================
PERIOD
======================================== */

function getCurrentPeriod(){

    let bulan = DOM.bulan.value;

    let tahun = DOM.tahun.value;


    if(

        !bulan ||

        !tahun

    ){

        return null;
    }


    return bulan+"-"+tahun;

}


/* ========================================
ADD BUTTON
======================================== */

function hideAddButton(){

    DOM.addRowWrap
    .style.display = "none";

}

function showAddButton(){

    DOM.addRowWrap
    .style.display = "flex";

}


/* ========================================
SUBTOTAL WRAP
======================================== */

function showSubtotal(){

    DOM.subtotalWrap
    .style.display = "flex";

}

function hideSubtotal(){

    DOM.subtotalWrap
    .style.display = "none";

}


/* ========================================
AUTOSAVE
======================================== */

function triggerAutoSave(){

    clearTimeout(

        APP.autoSaveTimer

    );


    APP.autoSaveTimer =

    setTimeout(()=>{

        saveAllRows();

        /* kalau tidak ada row edit aktif */

        if(!APP.editingRow){

            reNumberRows();

            renderMergedDates();

            calculateSubtotal();

        }

    },500);

}


/* ========================================
FORMATTERS
======================================== */

function parseCurrency(value){

    if(!value){

        return 0;
    }

    return Number(

        value.replace(
            /[^0-9]/g,
            ''
        )

    ) || 0;

}


function formatRupiah(el){

    let raw =

        el.value.replace(
            /[^0-9]/g,
            ''
        );


    if(!raw){

        el.value = "";

        triggerAutoSave();

        return;
    }


    el.value =

        "Rp " +

        Number(raw)
        .toLocaleString(
            "id-ID"
        );


    calculateSubtotal();

    triggerAutoSave();

}


function formatNumber(el){

    let raw =

        el.value.replace(
            /[^0-9]/g,
            ''
        );


    if(!raw){

        el.value = "";

        triggerAutoSave();

        return;
    }


    el.value =

        Number(raw)
        .toLocaleString(
            "id-ID"
        );


    triggerAutoSave();

}


/* ========================================
DATE INPUT
2 digit only
======================================== */

function onlyDate(el){

    let value =

        el.value.replace(
            /[^0-9]/g,
            ''
        );


    if(value.length>2){

        value =

            value.substring(
                0,
                2
            );

    }


    el.value = value;

    triggerAutoSave();

}


/* ========================================
MERGE ENGINE HELPERS
======================================== */

function isLockedRow(row){

    return row
    .querySelector(".start")
    ?.readOnly || false;

}


function getRowDate(row){

    let input = row.querySelector(".tanggal");

    if(input){

        let value = input.value.trim();

if(!value) return "";

return value.padStart(2,"0");

    }

    let value = row.dataset.date || "";

if(!value) return "";

return value.padStart(2,"0");

}

/* ========================================
ROW STATE
======================================== */

function hasDraftRow(){

    return qs(

        '#tableBody input:not([readonly])'

    ) !== null;

}


function clearEditingState(){

    getRows()
    .forEach(row=>{

        row.classList.remove(
            "editingRow"
        );

        /* restore lock semua row */

        row.querySelectorAll("input")
        .forEach(inp=>{

            inp.readOnly = true;

        });

    });

    APP.editingRow = null;

}

/* ========================================
CREATE ROW FACTORY
======================================== */

function createRow(data={}){

    let locked = data.locked || false;

    let actionHtml = "";


    if(locked){

        actionHtml = `

        <div class="actionCell">

            <button class="actionBtn btnInsert">
            ➕
            </button>

            <button class="actionBtn btnEdit">
            ✏️
            </button>

            <button class="actionBtn btnDelete">
            🗑️
            </button>

        </div>

        `;
    }

    else{

        actionHtml = `

        <div class="actionCell">

            <button class="actionBtn btnSave">
            💾
            </button>

            <button class="actionBtn btnDeleteDraft">
            🗑️
            </button>

        </div>

        `;
    }


    let tr = document.createElement("tr");


    tr.innerHTML = `

    <td>

        <input

            class="tanggal"

            maxlength="2"

            value="${data.tanggal || ""}"

        >

    </td>

    <td class="noCell">
    </td>

    <td>

        <input
        class="start"
        value="${data.start || ""}">

    </td>

    <td>

        <input
        class="arrive"
        value="${data.arrive || ""}">

    </td>

    <td>

        <input
        class="parkingLoc"
        value="${data.parking || ""}">

    </td>

    <td>

        <input
        class="flazz"
        value="${data.flazz || ""}">

    </td>

    <td>

        <input
        class="cash"
        value="${data.cash || ""}">

    </td>

    <td>

        <input
        class="km"
        value="${data.km || ""}">

    </td>

    <td class="rowTotal">
    </td>

    <td>
        ${actionHtml}
    </td>

    `;


    /* readonly if locked */

    if(locked){

        tr.querySelectorAll("input")
        .forEach(inp=>{

            inp.readOnly = true;

        });

    }


    /* bind input events */

    tr.querySelector(".tanggal")
    .addEventListener(

        "input",

        function(){

            onlyDate(this);

        }

    );


    tr.querySelector(".start")
    .addEventListener(

        "input",

        triggerAutoSave

    );


    tr.querySelector(".arrive")
    .addEventListener(

        "input",

        triggerAutoSave

    );


    tr.querySelector(".parkingLoc")
    .addEventListener(

        "input",

        triggerAutoSave

    );


    tr.querySelector(".flazz")
    .addEventListener(

        "input",

        function(){

            formatRupiah(this);

        }

    );


    tr.querySelector(".cash")
    .addEventListener(

        "input",

        function(){

            formatRupiah(this);

        }

    );


    tr.querySelector(".km")
    .addEventListener(

        "input",

        function(){

            formatNumber(this);

        }

    );


    return tr;

}


/* ========================================
ADD NEW ROW
======================================== */

function addNewRow(){

    let period = getCurrentPeriod();

    if(!period){

        alert(
            "Pilih periode terlebih dahulu"
        );

        return;
    }


    /* block duplicate draft */

    if(hasDraftRow()){

        alert(
            "Selesaikan baris aktif terlebih dahulu"
        );

        return;
    }


    hideAddButton();

    showSubtotal();


    let row = createRow({

        locked : false

    });


    DOM.tableBody.appendChild(
        row
    );


    APP.editingRow = row;

    saveAllRows();

}


/* ========================================
INSERT ROW BELOW
copy parent date
======================================== */

function insertRowBelow(btn){

/* buka merge dulu */

unmergeDates();

    if(hasDraftRow()){

        alert(
            "Masih ada draft aktif"
        );

        return;
    }


    let currentRow =

        btn.closest("tr");


    let parentDate =

        currentRow
        .querySelector(".tanggal")
        .value;


    hideAddButton();

    showSubtotal();


    let row = createRow({

        tanggal : parentDate,

        locked : false

    });


    currentRow
    .insertAdjacentElement(

        "afterend",

        row

    );


    APP.editingRow = row;

reNumberRows();

renderMergedDates();

saveAllRows();

}


/* ========================================
TABLE EVENT DELEGATION
======================================== */

function bindTableDelegation(){

    DOM.tableBody
    .addEventListener(

        "click",

        function(event){

            let target =

                event.target;


            if(

                target.classList.contains(
                    "btnSave"
                )

            ){

                saveRow(target);

            }


            if(

                target.classList.contains(
                    "btnEdit"
                )

            ){

                editRow(target);

            }


            if(

                target.classList.contains(
                    "btnDelete"
                )

            ){

                deleteRow(target);

            }


            if(

                target.classList.contains(
                    "btnDeleteDraft"
                )

            ){

                deleteDraftRow(target);

            }


            if(

                target.classList.contains(
                    "btnInsert"
                )

            ){

                insertRowBelow(target);

            }

        }

    );

}

/* ========================================
UNMERGE DATE CELLS
======================================== */

function unmergeDates(){

    let rows = getRows();

    rows.forEach(row=>{

        row.classList.remove(
            "groupWhite",
            "groupGray"
        );

        let cell = row.children[0];

        /* restore hidden date cell */

        if(cell.style.display==="none"){

            cell.style.display="";

        }

        /* reset rowspan */

        cell.rowSpan = 1;

        cell.classList.remove(
            "mergedDate"
        );

        /* kalau date sudah berubah jadi text */

        if(!cell.querySelector(".tanggal")){

            let val =
                row.dataset.date || "";

            cell.innerHTML = `

            <input
            class="tanggal"
            maxlength="2"
            value="${val}">

            `;

            /* bind ulang */

            cell.querySelector(".tanggal")
            .addEventListener(
                "input",
                function(){

                    onlyDate(this);

                }
            );

        }

    });

}

/* ========================================
RENDER MERGED DATE
======================================== */

function renderMergedDates(){

    let rows = getRows();

    /* reset dulu */

    unmergeDates();

    let colorIndex = 0;

    let i = 0;

    while(i < rows.length){

        let row = rows[i];

        let locked = isLockedRow(row);

        /* skip draft */

        if(!locked){

            i++;
            continue;
        }

        let date = getRowDate(row);

        if(!date){

            i++;
            continue;
        }

        row.dataset.date = date;

        let group = [row];

        /* cari row locked berikut date sama */

        for(

            let j=i+1;

            j<rows.length;

            j++

        ){

            let next = rows[j];

            let nextLocked =
                isLockedRow(next);

            /* stop kalau draft */

            if(!nextLocked){

                break;
            }

            let nextDate =
                getRowDate(next);

            if(nextDate===date){

                group.push(next);

            }
            else{

                break;
            }

        }

        /* warna grup */

        let colorClass =

            (colorIndex%2===0)

            ? "groupWhite"

            : "groupGray";


        group.forEach(r=>{

            r.classList.add(
                colorClass
            );

        });


        /* merge kalau >1 */

        if(group.length>1){

            let firstCell =
                group[0].children[0];

            firstCell.innerHTML =
                date;

            firstCell.classList.add(
                "mergedDate"
            );

            firstCell.rowSpan =
                group.length;

            for(

                let k=1;

                k<group.length;

                k++

            ){

                group[k]
                .children[0]
                .style.display="none";

            }

        }

        colorIndex++;

        i += group.length;

    }

}

/* ========================================
RENUMBER
RESET PER DATE GROUP
======================================== */

function reNumberRows(){

    let rows = getRows();

    let i = 0;

    while(i < rows.length){

        let row = rows[i];

        let locked = isLockedRow(row);

        /* skip draft row */

        if(!locked){

            row.querySelector(
                ".noCell"
            ).innerText = "";

            i++;
            continue;
        }

        let date = getRowDate(row);

        if(!date){

            row.querySelector(
                ".noCell"
            ).innerText = "";

            i++;
            continue;
        }

        let group = [row];

        /* cari grup tanggal sama */

        for(

            let j=i+1;

            j<rows.length;

            j++

        ){

            let next = rows[j];

            let nextLocked =
                isLockedRow(next);

            /* stop kalau draft */

            if(!nextLocked){

                break;
            }

            let nextDate =
                getRowDate(next);

            if(nextDate===date){

                group.push(next);

            }
            else{

                break;
            }

        }

        /* nomor reset */

        group.forEach(

            (r,index)=>{

                r.querySelector(
                    ".noCell"
                ).innerText =

                    index + 1;

            }

        );

        i += group.length;

    }

}

/* ========================================
CALCULATE SUBTOTAL
======================================== */

function calculateSubtotal(){

    DOM.subTotal.innerText = "";

    let rows = getRows();

    let grandTotal = 0;


    rows.forEach(row=>{

        let totalCell =

            row.querySelector(
                ".rowTotal"
            );


        totalCell.innerText = "";


        let locked =

            row.querySelector(".start")
            ?.readOnly || false;


        if(!locked){

            return;
        }


        let flazz =

            parseCurrency(

                row.querySelector(
                    ".flazz"
                ).value

            );


        let cash =

            parseCurrency(

                row.querySelector(
                    ".cash"
                ).value

            );


        let rowTotal =

            flazz + cash;


        if(rowTotal>0){

            totalCell.innerText =

                "Rp " +

                rowTotal
                .toLocaleString(
                    "id-ID"
                );

        }


        grandTotal += rowTotal;

    });


    if(grandTotal>0){

        DOM.subTotal.innerText =

            "Rp " +

            grandTotal
            .toLocaleString(
                "id-ID"
            );

    }
    else{

        DOM.subTotal.innerText = "";

    }

}


/* ========================================
SAVE ROW
======================================== */

function saveRow(btn){

    clearTimeout(
        APP.autoSaveTimer
    );


    let row =

        btn.closest("tr");


    let tanggal =

        row.querySelector(
            ".tanggal"
        ).value.trim();


    let start =

        row.querySelector(
            ".start"
        ).value.trim();


    let arrive =

        row.querySelector(
            ".arrive"
        ).value.trim();


    let parking =

        row.querySelector(
            ".parkingLoc"
        ).value.trim();


    let flazz =

        row.querySelector(
            ".flazz"
        ).value.trim();


    let cash =

        row.querySelector(
            ".cash"
        ).value.trim();


    /* validation */

    if(!tanggal){

        alert(
            "Date wajib diisi"
        );

        return;
    }


    if(

        !start &&

        !arrive &&

        !parking

    ){

        alert(

            "Isi minimal Start / Arrive / Parking"

        );

        return;
    }


    if(

        !flazz &&

        !cash

    ){

        alert(

            "Isi minimal Flazz atau Cash"

        );

        return;
    }


    let ok = confirm(

        "Data sudah benar?"

    );


    if(!ok){

        return;
    }


    /* lock row */

    row.querySelectorAll("input")
    .forEach(inp=>{

        inp.readOnly = true;

    });


    /* remove editing state */

    row.classList.remove(
        "editingRow"
    );


    APP.editingRow = null;


    /* restore action */

    row.cells[
        row.cells.length-1
    ].innerHTML = `

    <div class="actionCell">

        <button class="actionBtn btnInsert">
        ➕
        </button>

        <button class="actionBtn btnEdit">
        ✏️
        </button>

        <button class="actionBtn btnDelete">
        🗑️
        </button>

    </div>

    `;


    showAddButton();

saveAllRows();

reNumberRows();

renderMergedDates();

calculateSubtotal();

}


/* ========================================
EDIT ROW
======================================== */

function editRow(btn){

    if(hasDraftRow()){

        alert(
            "Masih ada draft aktif"
        );

        return;
    }


    let ok = confirm(

        "Edit baris ini?"

    );


    if(!ok){

        return;
    }


    let row =

        btn.closest("tr");


    clearEditingState();

unmergeDates();

hideAddButton();


    /* all rows readonly */

    getRows()
    .forEach(r=>{

        r.querySelectorAll("input")
        .forEach(inp=>{

            inp.readOnly = true;

        });

    });


    /* unlock selected */

    row.querySelectorAll("input")
    .forEach(inp=>{

        inp.readOnly = false;

    });


    /* highlight */

    row.classList.add(
        "editingRow"
    );


    APP.editingRow = row;


    /* action save */

    row.cells[
        row.cells.length-1
    ].innerHTML = `

    <div class="actionCell">

        <button class="actionBtn btnSave">
        💾
        </button>

        <button class="actionBtn btnDelete">
        🗑️
        </button>

    </div>

    `;

}

/* ========================================
SAVE ALL ROWS
autosave raw state
======================================== */

function saveAllRows(){

    let period = getCurrentPeriod();

    if(!period){

        return;
    }


    let rows = getRows();

    let data = [];


    rows.forEach(row=>{

        data.push({

            tanggal :

                row.querySelector(
                    ".tanggal"
                ).value || "",


            start :

                row.querySelector(
                    ".start"
                ).value || "",


            arrive :

                row.querySelector(
                    ".arrive"
                ).value || "",


            parking :

                row.querySelector(
                    ".parkingLoc"
                ).value || "",


            flazz :

                row.querySelector(
                    ".flazz"
                ).value || "",


            cash :

                row.querySelector(
                    ".cash"
                ).value || "",


            km :

                row.querySelector(
                    ".km"
                ).value || "",


            locked :

                row.querySelector(
                    ".start"
                ).readOnly || false

        });

    });


    let allData = {};

try{

    allData = JSON.parse(

        localStorage.getItem(
            APP.storageKey
        )

    ) || {};

}
catch{

    allData = {};

}


    allData[period] = data;


    localStorage.setItem(

        APP.storageKey,

        JSON.stringify(
            allData
        )

    );


    localStorage.setItem(

        APP.lastPeriodKey,

        period

    );

}


/* ========================================
LOAD PERIOD DATA
======================================== */

function loadPeriodData(){

    /* prevent switch during edit */

    if(APP.editingRow){

        let ok = confirm(

            "Masih ada edit aktif. Pindah periode?"

        );

        if(!ok){

            return;
        }

        APP.editingRow = null;
    }


    clearEditingState();
    
    unmergeDates();


    let period = getCurrentPeriod();


    if(!period){

        DOM.tableBody.innerHTML = "";

        hideSubtotal();

        showAddButton();

        return;
    }


    let allData = {};

try{

    allData = JSON.parse(

        localStorage.getItem(
            APP.storageKey
        )

    ) || {};

}
catch{

    allData = {};

}


    let data =

        allData[period] || [];


    DOM.tableBody.innerHTML = "";


    if(data.length===0){

        hideSubtotal();

        showAddButton();

        return;
    }


    showSubtotal();


    data.forEach(item=>{

        let row = createRow({

            tanggal :

                item.tanggal,

            start :

                item.start,

            arrive :

                item.arrive,

            parking :

                item.parking,

            flazz :

                item.flazz,

            cash :

                item.cash,

            km :

                item.km,

            locked :

                item.locked

        });


        DOM.tableBody
        .appendChild(row);

    });


    if(hasDraftRow()){

        hideAddButton();

    }
    else{

        showAddButton();

    }


    reNumberRows();

renderMergedDates();

calculateSubtotal();

}


/* ========================================
RESTORE LAST PERIOD
======================================== */

function restoreLastPeriod(){

    let last =

        localStorage.getItem(

            APP.lastPeriodKey

        );


    if(!last){

        return;
    }


    let split =

        last.split("-");


    if(split.length!==2){

        return;
    }


    DOM.bulan.value = split[0];

    DOM.tahun.value = split[1];


    loadPeriodData();

}


/* ========================================
GLOBAL EVENTS
======================================== */

function bindGlobalEvents(){

    /* add row */

    DOM.btnAddRow
    .addEventListener(

        "click",

        addNewRow

    );


    /* period */

    DOM.bulan
    .addEventListener(

        "change",

        loadPeriodData

    );


    DOM.tahun
    .addEventListener(

        "change",

        loadPeriodData

    );


    /* profile */

    document
    .getElementById(
        "btnSaveProfile"
    )
    .addEventListener(

        "click",

        saveProfile

    );


    document
    .getElementById(
        "btnEditProfile"
    )
    .addEventListener(

        "click",

        editProfile

    );


    /* profile shortcut */

    document
    .getElementById(
        "profileShortcut"
    )
    .addEventListener(

        "click",

        function(){

            showPage(
                "profile"
            );

        }

    );


    /* sidebar */

    qsa(".menu")
    .forEach(menu=>{

        menu.addEventListener(

            "click",

            function(){

                let page =

                    this.dataset.page;

                showPage(page);

            }

        );

    });


    /* table */

    bindTableDelegation();

}


/* ========================================
BOOT APP
======================================== */

function bootApp(){

    loadProfile();

    bindGlobalEvents();

    restoreLastPeriod();

    reNumberRows();

    renderMergedDates();

    calculateSubtotal();

    showPage("input");

}


/* ========================================
WINDOW LOAD
======================================== */

window.addEventListener(

    "load",

    bootApp

);
