<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT JASA MANDIRI TECHGRAHA</title>

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html{
    width:100%;
    overflow-x:hidden;
}

body{
    background:#f4f7fb;
    padding:12px;
    min-height:100vh;
    overflow-x:hidden;
}

/* =========================
HEADER
========================= */

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.company h1{
    font-size:14px;
    line-height:1.3;
}

.company p{
    font-size:10px;
    color:red;
}

.profile-name{
    font-size:9px;
    margin-top:6px;
    color:#000;
    font-weight:700;
    text-transform:uppercase;
    line-height:1.2;
}

.profile{
    width:56px;
    height:56px;
    cursor:pointer;
}

/* =========================
CARDS
========================= */

.period-card,
.table-card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.period-card{
    margin-bottom:20px;
}

.table-card{
    margin-bottom:20px;
}

/* =========================
PERIOD
========================= */

.period-row{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:nowrap;
}

.period-row label{
    font-weight:bold;
    margin-right:4px;
}

select{
    height:38px;
    padding:0 10px;
    border-radius:8px;
    width:140px;
    background:white;
    border:1px solid #000;
    text-align:center;
    text-align-last:center;
    font-weight:bold;
}

/* =========================
TABLE
========================= */

.table-header{
    margin-bottom:15px;
}

.table-header h4{
    font-size:12px;
    color:#1f2937;
}

.table-wrapper{
    width:100%;
    overflow-x:auto;
}



/* =========================
TABLE
========================= */

#mainTable{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
    border:1px solid #000;
    table-layout:fixed;
}

/* Date */
th:nth-child(1),
td.date-cell{
    width:40px;
    min-width:40px;
    max-width:40px;
    padding:2px;
    text-align:center;
}
/* No */
th:nth-child(2),
td.no-cell{
    width:35px;
    min-width:35px;
    max-width:35px;
    text-align:center;
}

.hidden-datefull{
    display:none;
    width:0 !important;
    min-width:0 !important;
    max-width:0 !important;
    padding:0 !important;
    border:none !important;
}
/* Start = kolom 4 */
th:nth-child(4),
td:nth-child(4){
    width:130px;
    min-width:130px;
    max-width:130px;
}

/* Arrive = kolom 5 */
th:nth-child(5),
td:nth-child(5){
    width:130px;
    min-width:130px;
    max-width:130px;
}

/* Parking = kolom 6 */
th:nth-child(6),
td:nth-child(6){
    width:130px;
    min-width:130px;
    max-width:130px;
}

/* Flazz = kolom 7 */
th:nth-child(7){
    width:60px;
    min-width:60px;
    max-width:60px;
}

td:nth-child(7){
    width:60px;
    min-width:60px;
    padding-right:6px;
}

/* Cash = kolom 8 */
th:nth-child(8){
    width:60px;
    min-width:60px;
    max-width:60px;
}

td:nth-child(8){
    width:60px;
    min-width:60px;
    max-width:60px;
    padding-right:6px;
}

/* KM = kolom 9 */
th:nth-child(9),
td:nth-child(9){
    width:60px;
    min-width:60px;
    max-width:60px;
}

/* Total = kolom 10 */
th:nth-child(10),
td:nth-child(10){
    width:70px;
    min-width:70px;
    max-width:70px;
}

/* Action = kolom 11 */
th:nth-child(11),
td:nth-child(11),
.action-cell{
    width:70px;
    min-width:70px;
    max-width:70px;
}

.center-cell{
    text-align:center;
    vertical-align:middle;
}

.money-cell{
    text-align:right;
    padding-right:8px;
}

.no-cell{
    text-align:center;
    font-weight:bold;
    vertical-align:middle;
}

th{
    background:#D1D5DB;
    border:1px solid #000;  
    padding:10px;
    font-size:10px;
    white-space:nowrap;
}

td{
    border:1px solid #000;
    padding:5px 6px;
    font-size:9px;
    line-height:1.2;
    height:28px;
    vertical-align:middle;
}


.date-cell{
    text-align:center;
    vertical-align:middle;   /* posisi tengah atas-bawah */
    font-weight:bold;
}

.total-cell{
    text-align:center;
    font-weight:bold;
    border:1px solid #000;
}

.hidden-datefull{
    display:none;
}

.placeholder{
    color:#999;
    text-align:center;
}

/* =========================
ACTION BUTTONS
========================= */

.action-cell{
    text-align:center;
    padding:0 !important;
    width:70px;
}
.action-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}
.action-btn{
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:11px;
    padding:0;
    width:14px;
    height:14px;
    line-height:1;
}

/* =========================
BOTTOM ACTIONS
========================= */

.bottom-actions{
    margin-top:14px;
    display:flex;
    justify-content:flex-end;
}

.subtotal-box{
    min-width:230px;
    border:1px solid #ddd;
    padding:10px 14px;
    border-radius:8px;
    background:#fafafa;
    font-size:12px;
    font-weight:bold;
}

.subtotal-value{
    float:right;
}

/* =========================
MODAL BASE
========================= */

.modal-overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.25);
    z-index:999;
    padding:20px;
}

.modal-card{
    width:100%;
    max-width:720px;
    background:#fff;
    border-radius:14px;
    padding:22px;
    box-shadow:0 4px 20px rgba(0,0,0,.12);
}

/* =========================
PROFILE TABLE
========================= */

/* td kanan */
.profile-table td:last-child{
    width:auto;
    padding:6px;
    overflow:hidden;   
}

/* input profile */
.profile-table input{
    display:block;
    width:100%;
    max-width:100%;   
    height:42px;
    padding:0 10px;
    border:1px solid #d8d8d8;
    border-radius:12px;
    font-size:14px;
    box-sizing:border-box;
}

.profile-table td{
    font-size:12px;
}

.profile-table td:first-child{
    width:1%;
    white-space:nowrap;
    padding-right:12px;
    background:#D1D5DB;
    font-weight:bold;
}

/* =========================
TITLE
========================= */

.modal-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:18px;
    color:#1f2937;
    text-align:center;
}

/* =========================
INPUT
========================= */

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:12px;
}

.currency-input{
    text-align:right;
}

/* =========================
INPUT GRID
========================= */

.input-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:20px;
}

.full{
    grid-column:1 / span 2;
}

/* =========================
BUTTONS
========================= */

.form-actions{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    margin-top:25px;   
}

.primary-btn{
    border:none;
    padding:11px 22px;
    cursor:pointer;
    border-radius:8px;
    background:#1f2937;
    color:white;
    font-size:12px;
}

.secondary-btn{
    background:#6b7280;
}

/* =========================
DELETE CONFIRM
========================= */

.confirm-box{
    width:100%;
    max-width:360px;
    background:#fff;
    border-radius:14px;
    padding:25px;
    text-align:center;
}

.confirm-text{
    font-size:14px;
    margin-bottom:20px;
}

.confirm-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .input-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }

    .form-actions{
        flex-direction:column;
    }

    .primary-btn{
        width:100%;
    }

    .bottom-actions{
        flex-direction:column;
        align-items:stretch;
    }

}

</style>
</head>

<body>

PART 3 = FULL JS FINAL
========================= -->

<script>
    
/* =========================
STATE
========================= */

let tableData = [];
let editIndex = null;
let deleteIndex = null;
let addBelowIndex = null;


/* profile lock */
let profileLocked = false;


/* =========================
ELEMENTS
========================= */

const tableBody = document.getElementById("tableBody");
const subtotalValue = document.getElementById("subtotalValue");

const formModal = document.getElementById("formModal");
const profileModal = document.getElementById("profileModal");
const deleteConfirmModal = document.getElementById("deleteConfirmModal");

const firstEditBtn = document.getElementById("firstEditBtn");
const cancelFormBtn = document.getElementById("cancelFormBtn");
const saveRowBtn = document.getElementById("saveRowBtn");

const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

const profileBtn = document.getElementById("profileBtn");
const closeProfileBtn = document.getElementById("closeProfileBtn");
const saveProfileBtn = document.getElementById("saveProfileBtn");

const profileNameDisplay = document.getElementById("profileNameDisplay");

const inputDateFull = document.getElementById("inputDateFull");
const inputStart = document.getElementById("inputStart");
const inputArrive = document.getElementById("inputArrive");
const inputParking = document.getElementById("inputParking");
const inputFlazz = document.getElementById("inputFlazz");
const inputCash = document.getElementById("inputCash");
const inputKm = document.getElementById("inputKm");

const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");


/* =========================
MODAL
========================= */

function openModal(modal){
    modal.style.display = "flex";
}

function closeModal(modal){
    modal.style.display = "none";
}

function setProfileLock(lock){

    profileLocked = lock;

    document.getElementById("employeeName").readOnly = lock;
    document.getElementById("employeeNik").readOnly = lock;
    document.getElementById("employeeUser").readOnly = lock;
    document.getElementById("employeeLocation").readOnly = lock;

    if(lock){

        saveProfileBtn.textContent = "Edit";

    }else{

        saveProfileBtn.textContent = "Save";

    }

}

/* =========================
HELPERS
========================= */

function formatRupiah(value){
    value = value.replace(/\D/g,"");
    if(value==="") return "";
    return "Rp " + Number(value).toLocaleString("id-ID");
}

function parseRupiah(value){
    return Number(value.replace(/[^\d]/g,"") || 0);
}

function extractDate(dateFull){
    if(!dateFull) return "";
    let p = dateFull.split("-");
    return Number(p[2]);
}


/* =========================
INPUT FORMAT LIVE
========================= */

inputFlazz.addEventListener("input",()=>{
    inputFlazz.value = formatRupiah(inputFlazz.value);
});

inputCash.addEventListener("input",()=>{
    inputCash.value = formatRupiah(inputCash.value);
});


/* =========================
PERIOD KEY
========================= */

function getPeriodKey(){
    let month = monthSelect.value || "defaultMonth";
    let year = yearSelect.value || "defaultYear";
    return "table_" + month + "_" + year;
}


/* =========================
SAVE TABLE LOCAL
========================= */

function saveTableData(){
    localStorage.setItem(
        getPeriodKey(),
        JSON.stringify(tableData)
    );
}


/* =========================
SUBTOTAL
========================= */

function updateSubtotal(){

    let total = 0;

    tableData.forEach(item=>{
        total += item.total;
    });

    subtotalValue.textContent =
    "Rp " + total.toLocaleString("id-ID");

}


/* =========================
CLEAR FORM
========================= */

function clearForm(){

    inputDateFull.value = "";
    inputStart.value = "";
    inputArrive.value = "";
    inputParking.value = "";
    inputFlazz.value = "";
    inputCash.value = "";
    inputKm.value = "";

    editIndex = null;

}


/* =========================
VALIDATE FORM
========================= */

function validateForm(){

    let lokasi =
    inputStart.value.trim() ||
    inputArrive.value.trim() ||
    inputParking.value.trim();

    let biaya =
    parseRupiah(inputFlazz.value) ||
    parseRupiah(inputCash.value);

    if(!inputDateFull.value){
        alert("Date wajib diisi");
        return false;
    }

    /* VALIDASI PERIOD */
    if(monthSelect.value && yearSelect.value){

        const bulanMap = {
            "Januari":0,
            "Februari":1,
            "Maret":2,
            "April":3,
            "Mei":4,
            "Juni":5,
            "Juli":6,
            "Agustus":7,
            "September":8,
            "Oktober":9,
            "November":10,
            "Desember":11
        };

        let inputDate = new Date(inputDateFull.value);

        let inputMonth = inputDate.getMonth();
        let inputYear = inputDate.getFullYear();

        let selectedMonth = bulanMap[monthSelect.value];
        let selectedYear = Number(yearSelect.value);

        if(inputMonth !== selectedMonth || inputYear !== selectedYear){
            alert("Tanggal harus sesuai Period yang dipilih");
            return false;
        }
    }

    if(!lokasi){
        alert("Isi Start / Arrive / Parking");
        return false;
    }

    if(!biaya){
        alert("Isi Flazz / Cash");
        return false;
    }

    return true;
}

/* =========================
RENDER TABLE
========================= */

function renderTable(){

    if(tableData.length===0){

        tableBody.innerHTML = `
        <tr id="placeholderRow">

            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="hidden-datefull">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>
            <td class="placeholder">-</td>

            <td class="action-cell">
                <button id="firstEditBtn"
                        class="action-btn">✏️</button>
            </td>

        </tr>`;

        document
        .getElementById("firstEditBtn")
        .onclick = ()=>{
            clearForm();
            openModal(formModal);
        };

        updateSubtotal();
        return;
    }

    /* sort by date */
    tableData.sort((a,b)=>
        new Date(a.dateFull)-new Date(b.dateFull)
    );

    let html = "";

    let grouped = {};
let dateTotals = {};

/* grouping dulu */
tableData.forEach((row,index)=>{

    if(!grouped[row.dateFull]){
        grouped[row.dateFull] = [];
    }

    grouped[row.dateFull].push({
        ...row,
        index:index
    });

});

/* baru hitung total per tanggal */
Object.keys(grouped).forEach(dateKey=>{

    let totalPerDate = 0;

    grouped[dateKey].forEach(row=>{

        totalPerDate += Number(row.flazz || 0);
        totalPerDate += Number(row.cash || 0);

    });

    dateTotals[dateKey] = totalPerDate;

});

    Object.keys(grouped).forEach(dateKey=>{

        let rows = grouped[dateKey];

        rows.forEach((row,rowIndex)=>{

    let nomor = rowIndex + 1;

    html += "<tr>";

    /* Date merge */
    if(rowIndex===0){
        html += `
        <td class="date-cell"
            rowspan="${rows.length}">
            ${extractDate(row.dateFull)}
        </td>
        `;
    }

    /* No */
    html += `
    <td class="no-cell">
        ${nomor}
    </td>
    `;

    /* hidden */
    if(rowIndex===0){
        html += `
        <td class="hidden-datefull"
            rowspan="${rows.length}">
            ${row.dateFull}
        </td>
        `;
    }

    /* data */
    html += `
    <td class="center-cell">${row.start}</td>
<td class="center-cell">${row.arrive}</td>
<td class="center-cell">${row.parking}</td>

    <td class="money-cell">
  ${row.flazz===0 ? "" : formatRupiah(String(row.flazz))}
</td>

<td class="money-cell">
  ${row.cash===0 ? "" : formatRupiah(String(row.cash))}
</td>

    <td>${row.km}</td>

    ${rowIndex===0 ? `
    <td class="total-cell"
        rowspan="${rows.length}">
        ${dateTotals[row.dateFull]===0
            ? ""
            : formatRupiah(String(dateTotals[row.dateFull]))}
    </td>
    ` : ""}

    <td class="action-cell">

        <div class="action-wrap">

            <button onclick="editRow(${row.index})"
                    class="action-btn">✏️</button>

            <button onclick="askDelete(${row.index})"
                    class="action-btn">🗑️</button>

            <button onclick="addNewRow(${row.index})"
                    class="action-btn">➕</button>

        </div>

    </td>
    `;
});

    });

    tableBody.innerHTML = html;

    updateSubtotal();
}

/* =========================
VALIDATE PROFILE + PERIOD
========================= */

function validateProfilePeriod(){

    let name =
    (localStorage.getItem("employeeName") || "").trim();

    let nik =
    (localStorage.getItem("employeeNik") || "").trim();

    let user =
    (localStorage.getItem("employeeUser") || "").trim();

    let car =
    (localStorage.getItem("employeeCar") || "").trim();

    if(!name || !nik || !user || !car){

        alert("Profile belum diisi lengkap");
        return false;
    }

    if(!monthSelect.value || !yearSelect.value){

        alert("Period belum dipilih");
        return false;
    }

    return true;
}
/* =========================
SAVE ROW
========================= */

saveRowBtn.onclick = ()=>{

    /* validasi profile + period */
    if(!validateProfilePeriod()) return;

    /* validasi form lama */
    if(!validateForm()) return;

    let confirmSave = confirm("Data sudah benar?");

    if(!confirmSave){
        return;
    }

    let flazz = parseRupiah(inputFlazz.value);
    let cash = parseRupiah(inputCash.value);

    let obj = {

    dateFull : inputDateFull.value,
    start : inputStart.value,
    arrive : inputArrive.value,
    parking : inputParking.value,
    flazz : flazz,
    cash : cash,
    km : inputKm.value,
    total : flazz + cash,

    
};

    if(editIndex===null){

    /* mode tambah dari tombol + */
    if(addBelowIndex !== null){

        

        /* insert di bawah row yang dipilih */
        tableData.splice(addBelowIndex + 1, 0, obj);

        addBelowIndex = null;

    }else{

        /* tambah normal */
        tableData.push(obj);

    }

}else{

    /* edit normal */
    obj.split = tableData[editIndex].split || false;

    tableData[editIndex] = obj;
}

    saveTableData();
    renderTable();
    clearForm();
    closeModal(formModal);

};


/* =========================
EDIT ROW
========================= */

window.addNewRow = function(index){

    addBelowIndex = index;

    clearForm();

    /* otomatis isi tanggal sama */
    inputDateFull.value = tableData[index].dateFull;

    openModal(formModal);
}
window.editRow = function(index){

    let row = tableData[index];

    editIndex = index;

    inputDateFull.value = row.dateFull;
    inputStart.value = row.start;
    inputArrive.value = row.arrive;
    inputParking.value = row.parking;
    inputFlazz.value = formatRupiah(String(row.flazz));
    inputCash.value = formatRupiah(String(row.cash));
    inputKm.value = row.km;

    openModal(formModal);

}

/* =========================
DELETE
========================= */

window.askDelete = function(index){

    deleteIndex = index;

    openModal(deleteConfirmModal);

}

confirmDeleteBtn.onclick = ()=>{

    if(deleteIndex!==null){

        tableData.splice(deleteIndex,1);

        saveTableData();
        renderTable();

        deleteIndex = null;
    }

    closeModal(deleteConfirmModal);

}

cancelDeleteBtn.onclick = ()=>{

    closeModal(deleteConfirmModal);

}


/* =========================
PROFILE
========================= */

function saveProfile(){

    let name =
    document.getElementById("employeeName").value.trim();

    let nik =
    document.getElementById("employeeNik").value.trim();

    let user =
    document.getElementById("employeeUser").value.trim();

    let car =
    document.getElementById("employeeLocation").value.trim();

    localStorage.setItem("employeeName",name);
    localStorage.setItem("employeeNik",nik);
    localStorage.setItem("employeeUser",user);
    localStorage.setItem("employeeCar",car);

    profileNameDisplay.textContent = name;

    setProfileLock(true);
}

function loadProfile(){

    let name = localStorage.getItem("employeeName") || "";
    let nik = localStorage.getItem("employeeNik") || "";
    let user = localStorage.getItem("employeeUser") || "";
    let car = localStorage.getItem("employeeCar") || "";

    document.getElementById("employeeName").value = name;
    document.getElementById("employeeNik").value = nik;
    document.getElementById("employeeUser").value = user;
    document.getElementById("employeeLocation").value = car;

    profileNameDisplay.textContent = name;

    if(name){

        setProfileLock(true);

    }else{

        setProfileLock(false);

    }

}

saveProfileBtn.onclick = ()=>{

    if(profileLocked){

        setProfileLock(false);

    }else{

        let name =
        document.getElementById("employeeName").value.trim();

        let nik =
        document.getElementById("employeeNik").value.trim();

        let user =
        document.getElementById("employeeUser").value.trim();

        let car =
        document.getElementById("employeeLocation").value.trim();

        if(!name || !nik || !user || !car){

            alert("Semua data profile wajib diisi");
            return;
        }

        let confirmSave =
        confirm("Data sudah benar?");

        if(!confirmSave) return;

        saveProfile();
        closeModal(profileModal);
    }
}
profileBtn.onclick = ()=>{

    // ambil ulang data tersimpan
    loadProfile();

    // buka modal
    openModal(profileModal);

}

closeProfileBtn.onclick = ()=>{

    closeModal(profileModal);

}
/* =========================
PERIOD
========================= */

function savePeriod(){

    localStorage.setItem(
        "savedMonth",
        monthSelect.value
    );

    localStorage.setItem(
        "savedYear",
        yearSelect.value
    );

}

function loadPeriod(){

    let m =
    localStorage.getItem("savedMonth");

    let y =
    localStorage.getItem("savedYear");

    if(m) monthSelect.value = m;
    if(y) yearSelect.value = y;

}

monthSelect.addEventListener("change",()=>{

    savePeriod();

    loadTable();

});

yearSelect.addEventListener("change",()=>{

    savePeriod();

    loadTable();

});


/* =========================
LOAD TABLE
========================= */

function loadTable(){

    let saved =
    localStorage.getItem(getPeriodKey());

    if(saved){

        tableData = JSON.parse(saved);

    }else{

        tableData = [];
    }

    renderTable();
}


/* =========================
BUTTONS
========================= */

cancelFormBtn.onclick = ()=>{

    closeModal(formModal);

}

firstEditBtn.onclick = ()=>{

    clearForm();

    openModal(formModal);

}


/* =========================
START
========================= */

window.onload = ()=>{

    loadProfile();
    loadPeriod();
    loadTable();

};
