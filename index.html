<script>

/* =========================================
FINAL CLEAN ARCHITECTURE V4
PART 2
STATE + STORAGE + PROFILE + UTILITIES
========================================= */


/* =========================================
APP STATE ( SINGLE SOURCE OF TRUTH )
========================================= */

const STATE = {

    storageKey : "toll_v4_data",

    profileKey : "toll_v4_profile",

    periodKey : "toll_v4_period",

    /* active page */

    page : "input",

    /* selected period */

    currentPeriod : "",

    /* active editing row id */

    editingId : null,

    /* autosave version */

    saveVersion : 0,

    /* profile */

    profile : {

        nama   : "",

        nik    : "",

        user   : "",

        lokasi : ""

    },

    /* rows */

    rows : []

};



/* =========================================
DOM CACHE
========================================= */

const DOM = {

    tableBody :

        document.getElementById(
            "tableBody"
        ),

    bulan :

        document.getElementById(
            "bulan"
        ),

    tahun :

        document.getElementById(
            "tahun"
        ),

    subtotalWrap :

        document.getElementById(
            "subtotalWrap"
        ),

    subTotal :

        document.getElementById(
            "subTotal"
        ),

    btnAddRow :

        document.getElementById(
            "btnAddRow"
        ),

btnSaveProfile :

    document.getElementById(
        "btnSaveProfile"
    ),

btnEditProfile :

    document.getElementById(
        "btnEditProfile"
    ),

};



/* =========================================
UTILITIES
========================================= */

function qs(selector){

    return document.querySelector(
        selector
    );

}


function qsa(selector){

    return document.querySelectorAll(
        selector
    );

}


function uid(){

    return Date.now()

        +

        Math.floor(

            Math.random()*1000

        );

}


function formatCurrency(number){

    number = Number(number)||0;

    if(number<=0){

        return "";
    }

    return "Rp " +

        number.toLocaleString(
            "id-ID"
        );

}


function parseCurrency(value){

    if(!value){

        return 0;
    }

    return Number(

        String(value)

        .replace(
            /[^0-9]/g,
            ""
        )

    ) || 0;

}


function parseNumber(value){

    if(!value){

        return 0;
    }

    return Number(

        String(value)

        .replace(
            /[^0-9]/g,
            ""
        )

    ) || 0;

}


function safeJSON(text){

    try{

        let obj = JSON.parse(text);

        if(

            typeof obj !== "object"

            ||

            obj===null

        ){

            return null;
        }

        return obj;

    }

    catch{

        return null;
    }

}



/* =========================================
PERIOD ENGINE
========================================= */

function getCurrentPeriod(){

    let bulan = DOM.bulan.value;

    let tahun = DOM.tahun.value;

    if(

        !bulan ||

        !tahun

    ){

        return "";
    }

    return bulan + "-" + tahun;

}


function updatePeriod(){

    STATE.currentPeriod =

        getCurrentPeriod();

}



/* =========================================
ROW FACTORY
========================================= */

function createRow(data={}){

    return {

        id :

            data.id || uid(),

        tanggal :

            data.tanggal || "",

        start :

            data.start || "",

        arrive :

            data.arrive || "",

        parking :

            data.parking || "",

        flazz :

            data.flazz || "",

        cash :

            data.cash || "",

        km :

            data.km || "",

        locked :

            data.locked || false

    };

}



/* =========================================
STORAGE ENGINE
========================================= */

const Storage = {


    /* save rows by period */

    saveRows(){

        if(

            !STATE.currentPeriod

        ){

            return;
        }


        let allData =

            safeJSON(

                localStorage.getItem(
                    STATE.storageKey
                )

            ) || {};


        allData[
            STATE.currentPeriod
        ] = STATE.rows;


        localStorage.setItem(

            STATE.storageKey,

            JSON.stringify(
                allData
            )

        );


        localStorage.setItem(

            STATE.periodKey,

            STATE.currentPeriod

        );

    },


    /* load rows by period */

    loadRows(){

        if(

            !STATE.currentPeriod

        ){

            STATE.rows = [];

            return;
        }


        let allData =

            safeJSON(

                localStorage.getItem(
                    STATE.storageKey
                )

            ) || {};


        let rows =
    allData[
        STATE.currentPeriod
    ] || [];

if(
    !Array.isArray(rows)
){
    rows = [];
}

STATE.rows =
    rows.map(row=>

        createRow(row)

    );

    },


    /* profile save */

    saveProfile(){

        localStorage.setItem(

            STATE.profileKey,

            JSON.stringify(

                STATE.profile

            )

        );

    },


    /* profile load */

    loadProfile(){

        let data =

            safeJSON(

                localStorage.getItem(
                    STATE.profileKey
                )

            );


        if(!data){

            return;
        }


        STATE.profile = {

            nama :

                data.nama || "",

            nik :

                data.nik || "",

            user :

                data.user || "",

            lokasi :

                data.lokasi || ""

        };

    },


    /* restore last period */

    restorePeriod(){

        let last =

            localStorage.getItem(

                STATE.periodKey

            );


        if(!last){

            return;
        }


        let split =

            last.split("-");


        if(

            split.length !== 2

        ){

            return;
        }


        DOM.bulan.value = split[0];

        DOM.tahun.value = split[1];

        STATE.currentPeriod = last;

    }

};



/* =========================================
PROFILE ENGINE
========================================= */

function updateProfileButtons(){

    let empty =

        !STATE.profile.nama &&
        !STATE.profile.nik &&
        !STATE.profile.user &&
        !STATE.profile.lokasi;


    if(empty){

        DOM.btnSaveProfile.style.display =
            "inline-block";

        DOM.btnEditProfile.style.display =
            "none";

        return;
    }


    DOM.btnSaveProfile.style.display =
        "none";

    DOM.btnEditProfile.style.display =
        "inline-block";

}

function loadProfileToUI(){

    document
    .getElementById("nama")
    .value = STATE.profile.nama;

    document
    .getElementById("nik")
    .value = STATE.profile.nik;

    document
    .getElementById("user")
    .value = STATE.profile.user;

    document
    .getElementById("lokasi")
    .value = STATE.profile.lokasi;


    [

        "nama",
        "nik",
        "user",
        "lokasi"

    ]

    .forEach(id=>{

        document
        .getElementById(id)
        .readOnly = true;

    });


    updateProfileButtons();

}



function saveProfile(){

    let nama =

        document
        .getElementById("nama")
        .value.trim();

    let nik =

        document
        .getElementById("nik")
        .value.trim();

    let user =

        document
        .getElementById("user")
        .value.trim();

    let lokasi =

        document
        .getElementById("lokasi")
        .value.trim();


    if(

        !nama ||

        !nik ||

        !user ||

        !lokasi

    ){

        alert(

            "Semua data profile wajib diisi"

        );

        return;

    }


    let ok = confirm(

        "Data sudah benar?"

    );


    if(!ok){
    return;
}

    STATE.profile = {

        nama   : nama,
        nik    : nik,
        user   : user,
        lokasi : lokasi

    };


    Storage.saveProfile();


    [

        "nama",
        "nik",
        "user",
        "lokasi"

    ]

    .forEach(id=>{

        document
        .getElementById(id)
        .readOnly = true;

    });


    updateProfileButtons();

}


function editProfile(){

    [

        "nama",
        "nik",
        "user",
        "lokasi"

    ]

    .forEach(id=>{

        document
        .getElementById(id)
        .readOnly = false;

    });


    DOM.btnSaveProfile.style.display =
        "inline-block";


    DOM.btnEditProfile.style.display =
        "none";

}


/* =========================================
AUTOSAVE ENGINE
VERSION SAFE
========================================= */

let autoSaveTimer = null;


function triggerAutoSave(){

    STATE.saveVersion++;

    let current =

        STATE.saveVersion;


    clearTimeout(
        autoSaveTimer
    );


    autoSaveTimer =

        setTimeout(()=>{

            if(

                current !==

                STATE.saveVersion

            ){

                return;
            }


            Storage.saveRows();

        },

        300);

}



/* =========================================
CALC ENGINE
========================================= */

function getRowTotal(row){

    let flazz =

        parseCurrency(
            row.flazz
        );


    let cash =

        parseCurrency(
            row.cash
        );


    return flazz + cash;

}



function getSubTotal(){

    return STATE.rows

    .filter(

        row=>row.locked

    )

    .reduce(

        (sum,row)=>{

            return sum +

                getRowTotal(row);

        },

        0

    );

}



/* =========================================
HELPERS
========================================= */

function hasActiveDraft(){

    return STATE.editingId !== null;

}



function findRow(id){

    return STATE.rows.find(

        row=>row.id===id

    );

}



function deleteById(id){

    STATE.rows =

        STATE.rows.filter(

            row=>row.id!==id

        );

}



/* =========================================
PAGE ENGINE
========================================= */

function showPage(page){

    STATE.page = page;


    qsa(".page")

    .forEach(el=>{

        el.classList.remove(
            "active"
        );

    });


    qsa(".menu")

    .forEach(el=>{

        el.classList.remove(
            "activeMenu"
        );

    });


    document
    .getElementById(page)
    .classList.add(
        "active"
    );


    document
    .querySelector(

        '.menu[data-page="'+page+'"]'

    )

    ?.classList.add(

        "activeMenu"

    );

}

/* =========================================
PART 3
TABLE RENDER ENGINE
NO DOM MUTATION ARCHITECTURE
========================================= */


/* =========================================
GROUP ENGINE
group rows by date
========================================= */

function groupRowsByDate(){

    let groups = [];
    let processedDates = [];

    for(let i=0;i<STATE.rows.length;i++){

        let row = STATE.rows[i];

        /* row draft tampil sesuai posisi asli */
        if(!row.locked){

            groups.push({
                single : true,
                rows : [row]
            });

            continue;
        }

        /* group locked by date */
        if(processedDates.includes(row.tanggal)){
            continue;
        }

        let sameDateRows =
            STATE.rows.filter(r=>

                r.tanggal===row.tanggal

                &&

                r.locked===true
            );

        groups.push({

            single : false,

            date : row.tanggal,

            rows : sameDateRows

        });

        processedDates.push(
            row.tanggal
        );
    }

    return groups;
}


/* =========================================
ROW HTML FACTORY
========================================= */

function createActionHTML(row){

    /* locked row */

    if(row.locked){

        return `

        <div class="actionCell">

            <button

            class="actionBtn btnInsert"

            data-id="${row.id}">

            ➕

            </button>

            <button

            class="actionBtn btnEdit"

            data-id="${row.id}">

            ✏️

            </button>

            <button

            class="actionBtn btnDelete"

            data-id="${row.id}">

            🗑️

            </button>

        </div>

        `;
    }


    /* draft row */

    return `

    <div class="actionCell">

        <button

        class="actionBtn btnSave"

        data-id="${row.id}">

        💾

        </button>

        <button

        class="actionBtn btnDelete"

        data-id="${row.id}">

        🗑️

        </button>

    </div>

    `;

}



/* =========================================
INPUT FACTORY
========================================= */

function createInput(

    className,

    value,

    editable = false

){

    let readonly =

        editable ? "" : "readonly";


    return `

    <input

    class="${className}"

    value="${value || ""}"

    ${readonly}

    >

    `;

}



/* =========================================
BUILD SINGLE ROW
========================================= */

function buildRow(

    row,

    index,

    totalRows,

    colorClass

){

    let editing =

        STATE.editingId===row.id

        ? "editingRow"

        : "";


    let editable =

        STATE.editingId===row.id;


    let dateCell = "";


    /* first row in group */

    if(index===0){

        dateCell = `

        <td rowspan="${totalRows}">

        ${createInput(

            "tanggal",

            row.tanggal,

            editable

        )}

        </td>

        `;
    }


    /* =========================================
TOTAL HANYA MUNCUL DI ROW TERAKHIR GROUP DATE
========================================= */

let total = "";

/* jika row terakhir dalam group */

if(index === totalRows - 1){

    let rowsInSameDate =

        STATE.rows.filter(r =>

            r.locked &&

            r.tanggal === row.tanggal

        );

    let grandTotal =

        rowsInSameDate.reduce(

            (sum,r)=>{

                let flazz =

                    parseCurrency(
                        r.flazz
                    );

                let cash =

                    parseCurrency(
                        r.cash
                    );

                return sum + flazz + cash;

            },

            0

        );

    total =

        formatCurrency(

            grandTotal

        );
}


    return `

    <tr

    data-id="${row.id}"

    class="${colorClass} ${editing}"

    >

        ${dateCell}

        <td>

            ${index+1}

        </td>

        <td>

        ${createInput(

            "start",

            row.start,

            editable

        )}

        </td>

        <td>

        ${createInput(

            "arrive",

            row.arrive,

            editable

        )}

        </td>

        <td>

        ${createInput(

            "parkingLoc",

            row.parking,

            editable

        )}

        </td>

        <td>

        ${createInput(

            "flazz",

            row.flazz,

            editable

        )}

        </td>

        <td>

        ${createInput(

            "cash",

            row.cash,

            editable

        )}

        </td>

        <td>

        ${createInput(

            "km",

            row.km,

            editable

        )}

        </td>

        <td>

            ${total}

        </td>

        <td>

            ${createActionHTML(row)}

        </td>

    </tr>

    `;

}



/* =========================================
RENDER TABLE
FULL RENDER FROM STATE
========================================= */

function renderTable(){

    let groups =

        groupRowsByDate();


    let html = "";

    let colorIndex = 0;


    groups.forEach(group=>{

        let colorClass =

            colorIndex % 2 === 0

            ?

            "groupWhite"

            :

            "groupGray";


        group.rows.forEach(

            (row,index)=>{

                html +=

                    buildRow(

                        row,

                        index,

                        group.rows.length,

                        colorClass

                    );

            }

        );


        colorIndex++;

    });


    DOM.tableBody.innerHTML = html;


    renderSubtotal();

    renderAddButton();

}



/* =========================================
SUBTOTAL RENDER
========================================= */

function renderSubtotal(){

    let subtotal =

        getSubTotal();


    if(

        STATE.rows.length===0

    ){

        DOM.subtotalWrap

        .style.display = "none";

        DOM.subTotal.innerText = "";

        return;
    }


    DOM.subtotalWrap

    .style.display = "flex";


    DOM.subTotal.innerText =

        formatCurrency(

            subtotal

        );

}



/* =========================================
ADD BUTTON STATE
========================================= */

function renderAddButton(){

    if(

        STATE.editingId !== null

    ){

        DOM.btnAddRow

        .style.display = "none";

        return;
    }


    DOM.btnAddRow

    .style.display = "inline-block";

}



/* =========================================
LOAD PERIOD DATA
========================================= */

function loadPeriodData(){

    updatePeriod();


    if(

        !STATE.currentPeriod

    ){

        STATE.rows = [];

        renderTable();

        return;
    }


    Storage.loadRows();

    renderTable();

}



/* =========================================
RELOAD EVERYTHING
========================================= */

function refresh(){

    renderTable();

    triggerAutoSave();

}

/* =========================================
PART 4
ACTION ENGINE
STATE DRIVEN
========================================= */


/* =========================================
ADD NEW ROW
========================================= */

function addRow(){

    if(

        !STATE.currentPeriod

    ){

        alert(
            "Pilih periode terlebih dahulu"
        );

        return;
    }


    if(

        STATE.editingId !== null

    ){

        alert(
            "Selesaikan baris aktif terlebih dahulu"
        );

        return;
    }


    let row = createRow({

        locked : false

    });


    STATE.rows.push(row);

    STATE.editingId = row.id;

    refresh();

}



/* =========================================
INSERT ROW BELOW
inherit same date
========================================= */

function insertRow(id){

    if(

        STATE.editingId !== null

    ){

        alert(
            "Masih ada draft aktif"
        );

        return;
    }


    let index =

        STATE.rows.findIndex(

            row=>row.id===id

        );


    if(index===-1){

        return;
    }


   if(
    !STATE.rows[index]
){
    return;
}

let parent =
    STATE.rows[index];


    let newRow = createRow({

        tanggal :

            parent.tanggal,

        locked : false

    });


    STATE.rows.splice(

        index + 1,

        0,

        newRow

    );


    STATE.editingId =

        newRow.id;


    refresh();

}



/* =========================================
EDIT ROW
========================================= */

function editRow(id){

    if(

        STATE.editingId !== null

    ){

        alert(
            "Masih ada draft aktif"
        );

        return;
    }


    let ok = confirm(

        "Edit baris ini?"

    );


    if(!ok){

        return;
    }


    let row =

        findRow(id);


    if(!row){

        return;
    }


    row.locked = false;

    STATE.editingId = id;

    refresh();

}



/* =========================================
VALIDATION ENGINE
========================================= */

function validateRow(row){

    let tanggal =
    Number(row.tanggal);

if(
    !row.tanggal.trim()
){
    alert(
        "Date wajib diisi"
    );
    return false;
}

if(
    tanggal < 1 ||
    tanggal > 31
){
    alert(
        "Tanggal harus 01 - 31"
    );
    return false;
}


    if(

        !row.start.trim()

        &&

        !row.arrive.trim()

        &&

        !row.parking.trim()

    ){

        alert(

            "Isi minimal Start / Arrive / Parking"

        );

        return false;
    }


    if(

        !row.flazz.trim()

        &&

        !row.cash.trim()

    ){

        alert(

            "Isi minimal Flazz atau Cash"

        );

        return false;
    }


    return true;

}



/* =========================================
SAVE ROW
========================================= */

function saveRow(id){

    let row =

        findRow(id);


    if(!row){

        return;
    }


    if(

        !validateRow(row)

    ){

        return;
    }


    let ok = confirm(

        "Data sudah benar?"

    );


    if(!ok){

        return;
    }


    row.locked = true;

    STATE.editingId = null;

    refresh();

}



/* =========================================
DELETE ROW
draft + locked
========================================= */

function deleteRow(id){

    let ok = confirm(

        "Hapus baris ini?"

    );


    if(!ok){

        return;
    }


    let row =
    findRow(id);

if(!row){
    return;
}

deleteById(id);


    if(

        STATE.editingId === id

    ){

        STATE.editingId = null;
    }


    refresh();

}



/* =========================================
UPDATE FIELD
sync input → STATE
========================================= */
function updateField(id, field, value){
    let row = findRow(id);
    if(!row) return;

    row[field] = value;

    triggerAutoSave(); // hanya save, NO render
}


/* =========================================
BUTTON ROUTER
========================================= */

function handleAction(

    action,

    id

){

    id = Number(id);


    if(

        action==="add"

    ){

        addRow();

        return;
    }


    if(

        action==="insert"

    ){

        insertRow(id);

        return;
    }


    if(

        action==="edit"

    ){

        editRow(id);

        return;
    }


    if(

        action==="save"

    ){

        saveRow(id);

        return;
    }


    if(

        action==="delete"

    ){

        deleteRow(id);

        return;
    }

}



/* =========================================
INPUT FIELD ROUTER
========================================= */

function handleInput(element){

    let tr =
        element.closest("tr");

    if(!tr){
        return;
    }

    let id =
        Number(
            tr.dataset.id
        );

    let field = "";

    if(
        element.classList.contains(
            "tanggal"
        )
    ){
        field = "tanggal";
    }

    else if(
        element.classList.contains(
            "start"
        )
    ){
        field = "start";
    }

    else if(
        element.classList.contains(
            "arrive"
        )
    ){
        field = "arrive";
    }

    else if(
        element.classList.contains(
            "parkingLoc"
        )
    ){
        field = "parking";
    }

    else if(
        element.classList.contains(
            "flazz"
        )
    ){
        field = "flazz";
    }

    else if(
        element.classList.contains(
            "cash"
        )
    ){
        field = "cash";
    }

    else if(
        element.classList.contains(
            "km"
        )
    ){
        field = "km";
    }

    if(!field){
        return;
    }

    let value = element.value;


    /* =========================
       FLAZZ + CASH
       SIMPAN FORMAT RUPIAH
    ========================= */

    if(
        field === "flazz"
        ||
        field === "cash"
    ){

        let numeric =
            parseCurrency(value);

        let formatted =
            formatCurrency(numeric);

        /* tampil realtime */

        element.value =
            formatted;

        /* simpan ke state format rupiah */

        updateField(
            id,
            field,
            formatted
        );

        return;
    }


    /* field normal */

    updateField(
        id,
        field,
        value
    );

}

/* =========================================
PART 5
EVENT ENGINE + BOOT SYSTEM
FINAL CLEAN ARCHITECTURE V4
========================================= */


/* =========================================
EVENT DELEGATION TABLE
single listener only
========================================= */

function bindTableEvents(){

    DOM.tableBody.addEventListener(

        "click",

        function(e){

            let btn =

                e.target.closest("button");


            if(!btn){

                return;
            }


            let id =

                btn.dataset.id;


            if(

                btn.classList.contains(
                    "btnInsert"
                )

            ){

                handleAction(

                    "insert",

                    id

                );

                return;
            }


            if(

                btn.classList.contains(
                    "btnEdit"
                )

            ){

                handleAction(

                    "edit",

                    id

                );

                return;
            }


            if(

                btn.classList.contains(
                    "btnSave"
                )

            ){

                handleAction(

                    "save",

                    id

                );

                return;
            }


            if(

                btn.classList.contains(
                    "btnDelete"
                )

            ){

                handleAction(

                    "delete",

                    id

                );

                return;
            }

        }

    );


    /* input realtime */

    DOM.tableBody.addEventListener(

        "input",

        function(e){

            let input =

                e.target.closest("input");


            if(!input){

                return;
            }


            handleInput(input);

        }

    );

}



/* =========================================
GLOBAL EVENTS
========================================= */

function bindGlobalEvents(){


    /* add row */

    DOM.btnAddRow.addEventListener(

        "click",

        function(){

            handleAction(
                "add"
            );

        }

    );


    /* period change */

    DOM.bulan.addEventListener(

        "change",

        function(){

            if(

                STATE.editingId!==null

            ){

                let ok = confirm(

                   "Masih ada edit aktif. Data yang belum disimpan akan hilang. Lanjut?"

                );

                if(!ok){

                    return;
                }

                STATE.editingId = null;
            }

            loadPeriodData();

        }

    );


    DOM.tahun.addEventListener(

        "change",

        function(){

            if(

                STATE.editingId!==null

            ){

                let ok = confirm(

                   "Masih ada edit aktif. Data yang belum disimpan akan hilang. Lanjut?"

                );

                if(!ok){

                    return;
                }

                STATE.editingId = null;
            }

            loadPeriodData();

        }

    );


    /* profile */

    document

    .getElementById(
        "btnSaveProfile"
    )

    .addEventListener(

        "click",

        saveProfile

    );


    document

    .getElementById(
        "btnEditProfile"
    )

    .addEventListener(

        "click",

        editProfile

    );


    /* shortcut profile */

    document

    .getElementById(
        "profileShortcut"
    )

    .addEventListener(

        "click",

        function(){

            showPage(
                "profile"
            );

        }

    );


    /* sidebar navigation */

    qsa(".menu")

    .forEach(menu=>{

        menu.addEventListener(

            "click",

            function(){

                let page =

                    this.dataset.page;


                showPage(page);

            }

        );

    });

}



/* =========================================
BOOT
========================================= */

function bootApp(){


    /* load profile */

    Storage.loadProfile();

    loadProfileToUI();


    /* restore period */

    Storage.restorePeriod();


    /* load rows */

    if(

        STATE.currentPeriod

    ){

        Storage.loadRows();
    }


    /* bind */

    bindGlobalEvents();

    bindTableEvents();


    /* first render */

    renderTable();


    /* default page */

    showPage("input");



    console.log(

        "FINAL CLEAN ARCHITECTURE V4 READY"

    );

}



/* =========================================
WINDOW LOAD
========================================= */

window.addEventListener(

    "load",

    bootApp

);

</script>
